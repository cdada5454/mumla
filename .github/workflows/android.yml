name: Android release APK

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional v* tag to upload the APK to an existing GitHub Release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show revision
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD
          git status --short

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail

          version_tag="${RELEASE_TAG}"
          if [[ -z "$version_tag" || "$version_tag" == "main" || "$version_tag" == "master" ]]; then
            version_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null || true)"
          fi
          if [[ -z "$version_tag" ]]; then
            version_tag="v0.0.1"
          fi
          if [[ ! "$version_tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release version must look like v0.0.1, got '$version_tag'."
            exit 1
          fi

          version_name="${version_tag#v}"
          echo "RELEASE_TAG=$version_tag" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "APK_FILE_NAME=mumla-${version_tag}.apk" >> "$GITHUB_ENV"
          echo "Resolved release tag: $version_tag"
          echo "Resolved app versionName: $version_name"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure signing
        shell: bash
        run: |
          set -euo pipefail

          has_release_key=false
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" || -n "${ANDROID_KEYSTORE_PASSWORD:-}" || -n "${ANDROID_KEY_ALIAS:-}" || -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" || -z "${ANDROID_KEYSTORE_PASSWORD:-}" || -z "${ANDROID_KEY_ALIAS:-}" || -z "${ANDROID_KEY_PASSWORD:-}" ]]; then
              echo "::error::ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD must be set together."
              exit 1
            fi
            has_release_key=true
          fi

          if [[ "$has_release_key" == "true" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.jks
            cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          }
          EOF
            echo "SIGNING_MODE=release" >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -keystore app/ci-release.jks \
              -storepass android \
              -alias ci-release \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Mumla CI,O=Mumla,C=US"
            cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("ci-release.jks")
                      storePassword "android"
                      keyAlias "ci-release"
                      keyPassword "android"
                  }
              }
          }
          EOF
            echo "SIGNING_MODE=ci" >> "$GITHUB_ENV"
          fi

      - name: Require real signing for releases
        if: ${{ github.event_name == 'release' || startsWith(inputs.release_tag, 'v') || startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$SIGNING_MODE" != "release" ]]; then
            echo "::error::Release uploads must use repository signing secrets."
            exit 1
          fi

      - name: Check source policy
        shell: bash
        run: ./gradlew --no-daemon checkNoPrebuiltLibraries

      - name: Build all native libraries
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon \
            -Pmumla.versionName="$APP_VERSION_NAME" \
            :libraries:humla:ndkBuild \
            :libraries:humla:externalNativeBuildRelease

      - name: Verify project native libraries before APK build
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import sys

          abis = ("armeabi-v7a", "arm64-v8a", "x86", "x86_64")
          legacy_libs = ("libjnicelt7.so", "libjnicelt11.so", "libjniopus.so", "libjnispeex.so")
          cmake_libs = ("libhumla_audioinput.so", "librnnoise.so", "libwebrtc_audio_processing.so")

          legacy_root = Path("libraries/humla/src/main/libs")
          humla_build_root = Path("libraries/humla/build")

          missing = []
          for abi in abis:
              missing.extend(
                  str(legacy_root / abi / lib)
                  for lib in legacy_libs
                  if not (legacy_root / abi / lib).is_file()
              )
              for lib in cmake_libs:
                  if not any(humla_build_root.glob(f"**/{abi}/**/{lib}")):
                      missing.append(f"{humla_build_root}/**/{abi}/**/{lib}")

          if missing:
              print("::error::Native library build did not produce all required runtime libraries:")
              print("\n".join(missing))
              sys.exit(1)
          PY

      - name: Build release APK
        shell: bash
        run: ./gradlew --no-daemon -Pmumla.versionName="$APP_VERSION_NAME" :app:assembleRelease

      - name: Collect and verify APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          if find app/build/outputs/apk -type f \( -name '*arm64-v8a-release.apk' -o -name '*armeabi-v7a-release.apk' -o -name '*x86-release.apk' -o -name '*x86_64-release.apk' \) -print | grep -q .; then
            echo "::error::ABI split APKs were produced. Expected one universal APK."
            find app/build/outputs/apk -type f -name '*.apk' -print
            exit 1
          fi

          if find app/build/outputs/apk/release -name '*-unsigned.apk' -print -quit | grep -q .; then
            echo "::error::Unsigned release APK was produced. Refusing to upload it."
            exit 1
          fi

          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*-release.apk' -print -quit)"
          if [[ -z "$apk_path" ]]; then
            echo "::error::No signed release APK found."
            find app/build/outputs/apk -type f -name '*.apk' -print
            exit 1
          fi

          version_name="$(python3 -c 'import json; print(json.load(open("app/build/outputs/apk/release/output-metadata.json"))["elements"][0]["versionName"])')"
          if [[ "$version_name" != "$APP_VERSION_NAME" ]]; then
            echo "::error::APK versionName '$version_name' does not match expected '$APP_VERSION_NAME'."
            exit 1
          fi

          artifact_path="artifacts/${APK_FILE_NAME}"
          cp "$apk_path" "$artifact_path"

          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$artifact_path"

          python3 - "$artifact_path" <<'PY'
          import sys
          import zipfile

          apk_path = sys.argv[1]
          required_entries = (
              "libandroidx.graphics.path.so",
              "libc++_shared.so",
              "libhumla_audioinput.so",
              "libjnicelt7.so",
              "libjnicelt11.so",
              "libjniopus.so",
              "libjnispeex.so",
              "librnnoise.so",
              "libwebrtc_audio_processing.so",
          )

          with zipfile.ZipFile(apk_path) as apk:
              entries = set(apk.namelist())

          packaged_abis = sorted({name.split("/")[1] for name in entries if name.startswith("lib/") and name.endswith(".so")})
          missing = [
              f"lib/{abi}/{lib}"
              for abi in packaged_abis
              for lib in required_entries
              if f"lib/{abi}/{lib}" not in entries
          ]
          if missing:
              print("::error::APK is missing required runtime native libraries:")
              print("\n".join(missing))
              sys.exit(1)
          PY

          sha256sum "$artifact_path" > artifacts/SHA256SUMS.txt
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "apk_file_name=$APK_FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "APK_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          ls -lh artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_file_name }}
          path: artifacts/
          if-no-files-found: error

      - name: Remove old ABI release assets
        if: ${{ github.event_name == 'release' || startsWith(inputs.release_tag, 'v') || startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          gh release delete-asset "$RELEASE_TAG" "mumla-v${tag_version}.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${tag_version}-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${tag_version}-arm64-v8a-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${tag_version}-armeabi-v7a-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-v${APK_VERSION_NAME}.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${APK_VERSION_NAME}-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${APK_VERSION_NAME}-arm64-v8a-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${APK_VERSION_NAME}-armeabi-v7a-release.apk" --yes || true

      - name: Upload GitHub Release assets
        if: ${{ github.event_name == 'release' || startsWith(inputs.release_tag, 'v') || startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Mumla v${{ steps.apk.outputs.version_name }}
          files: artifacts/*
