name: Android release APK

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional existing v* tag to publish APKs to its GitHub Release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release-apks:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" == "tag" || "$GITHUB_EVENT_NAME" == "release" || -n "${{ inputs.release_tag }}" ]]; then
            version_name="${RELEASE_TAG#v}"
            if [[ "$version_name" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9]+))?$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              build="${BASH_REMATCH[5]:-0}"
              version_code=$((10#$major * 1000000 + 10#$minor * 10000 + 10#$patch * 100 + 10#$build))
            else
              version_code=$((3070300 + GITHUB_RUN_NUMBER))
            fi
          else
            version_name="0.0.0-${GITHUB_RUN_NUMBER}"
            version_code=$((3070300 + GITHUB_RUN_NUMBER))
          fi

          echo "RELEASE_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Configure APK signing
        shell: bash
        run: |
          set -euo pipefail

          has_release_key=false
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" || -n "${ANDROID_KEYSTORE_PASSWORD:-}" || -n "${ANDROID_KEY_ALIAS:-}" || -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" || -z "${ANDROID_KEYSTORE_PASSWORD:-}" || -z "${ANDROID_KEY_ALIAS:-}" || -z "${ANDROID_KEY_PASSWORD:-}" ]]; then
              echo "::error::ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD must be set together."
              exit 1
            fi
            has_release_key=true
          fi

          if [[ "$has_release_key" == "true" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.jks
            cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          }
          EOF
            echo "SIGNING_MODE=release" >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -keystore app/ci-release.jks \
              -storepass android \
              -alias ci-release \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Mumla CI,O=Mumla,C=US"
            cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("ci-release.jks")
                      storePassword "android"
                      keyAlias "ci-release"
                      keyPassword "android"
                  }
              }
          }
          EOF
            echo "SIGNING_MODE=ci" >> "$GITHUB_ENV"
          fi

      - name: Require release signing for tag releases
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || startsWith(inputs.release_tag, 'v') }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$SIGNING_MODE" != "release" ]]; then
            echo "::error::Tag releases must be signed with repository secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi

      - name: Check source tree does not contain prebuilt libraries
        run: ./gradlew --no-daemon checkNoPrebuiltLibraries

      - name: Build FOSS release APK
        shell: bash
        run: |
          ./gradlew --no-daemon :app:assembleFossRelease \
            -Pmumla.versionName="$RELEASE_VERSION_NAME" \
            -Pmumla.versionCode="$RELEASE_VERSION_CODE"

      - name: Collect APKs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          if find app/build/outputs/apk/foss/release -name '*-unsigned.apk' -print -quit | grep -q .; then
            echo "::error::Unsigned APKs were produced. Refusing to upload install-broken artifacts."
            exit 1
          fi

          cp app/build/outputs/apk/foss/release/*-release.apk \
            "artifacts/mumla-${RELEASE_VERSION_NAME}-release.apk"
          for apk in artifacts/*.apk; do
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$apk"
          done
          sha256sum artifacts/*.apk > artifacts/SHA256SUMS.txt
          ls -lh artifacts

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mumla-${{ steps.metadata.outputs.version_name }}-release-apk
          path: artifacts/
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || startsWith(inputs.release_tag, 'v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Mumla ${{ steps.metadata.outputs.version_name }}
          files: artifacts/*
