name: Android release APKs

on:
  push:
    branches:
      - main
      - master
    tags:
      - v0.0.1
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION_NAME: v0.0.1
  RELEASE_VERSION_CODE: 1

jobs:
  build-release-apks:
    name: Build armv7a and armv8a release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.jks
          cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          }
          EOF

      - name: Check source tree does not contain prebuilt libraries
        run: ./gradlew --no-daemon checkNoPrebuiltLibraries

      - name: Build FOSS release ABI APKs
        run: |
          ./gradlew --no-daemon :app:assembleFossRelease \
            -Pmumla.versionName="$RELEASE_VERSION_NAME" \
            -Pmumla.versionCode="$RELEASE_VERSION_CODE" \
            -Pmumla.enableAbiSplits=true

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/foss/release/*armeabi-v7a*.apk \
            "artifacts/mumla-${RELEASE_VERSION_NAME}-armeabi-v7a-release.apk"
          cp app/build/outputs/apk/foss/release/*arm64-v8a*.apk \
            "artifacts/mumla-${RELEASE_VERSION_NAME}-arm64-v8a-release.apk"
          sha256sum artifacts/*.apk > artifacts/SHA256SUMS.txt
          ls -lh artifacts

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mumla-${{ env.RELEASE_VERSION_NAME }}-release-apks
          path: artifacts/
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: ${{ github.ref == 'refs/tags/v0.0.1' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.1
          name: Mumla v0.0.1
          files: artifacts/*
