name: Android release APK

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional v* tag to upload the APK to an existing GitHub Release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show revision
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD
          git status --short

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure signing
        shell: bash
        run: |
          set -euo pipefail

          has_release_key=false
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" || -n "${ANDROID_KEYSTORE_PASSWORD:-}" || -n "${ANDROID_KEY_ALIAS:-}" || -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" || -z "${ANDROID_KEYSTORE_PASSWORD:-}" || -z "${ANDROID_KEY_ALIAS:-}" || -z "${ANDROID_KEY_PASSWORD:-}" ]]; then
              echo "::error::ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD must be set together."
              exit 1
            fi
            has_release_key=true
          fi

          if [[ "$has_release_key" == "true" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.jks
            cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          }
          EOF
            echo "SIGNING_MODE=release" >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -keystore app/ci-release.jks \
              -storepass android \
              -alias ci-release \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Mumla CI,O=Mumla,C=US"
            cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("ci-release.jks")
                      storePassword "android"
                      keyAlias "ci-release"
                      keyPassword "android"
                  }
              }
          }
          EOF
            echo "SIGNING_MODE=ci" >> "$GITHUB_ENV"
          fi

      - name: Require real signing for releases
        if: ${{ github.event_name == 'release' || startsWith(inputs.release_tag, 'v') || startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$SIGNING_MODE" != "release" ]]; then
            echo "::error::Release uploads must use repository signing secrets."
            exit 1
          fi

      - name: Check source policy
        shell: bash
        run: ./gradlew --no-daemon checkNoPrebuiltLibraries

      - name: Build legacy native codecs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon :libraries:humla:ndkBuild
          python3 - <<'PY'
          from pathlib import Path
          import sys

          abis = ("armeabi-v7a", "arm64-v8a", "x86", "x86_64")
          libs = ("libjnicelt7.so", "libjnicelt11.so", "libjniopus.so", "libjnispeex.so")
          root = Path("libraries/humla/src/main/libs")
          missing = [str(root / abi / lib) for abi in abis for lib in libs if not (root / abi / lib).is_file()]
          if missing:
              print("::error::Missing native codec outputs:")
              print("\n".join(missing))
              sys.exit(1)
          PY

      - name: Build release APK
        shell: bash
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Collect and verify APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts

          if find app/build/outputs/apk -type f \( -name '*arm64-v8a-release.apk' -o -name '*armeabi-v7a-release.apk' -o -name '*x86-release.apk' -o -name '*x86_64-release.apk' \) -print | grep -q .; then
            echo "::error::ABI split APKs were produced. Expected one universal APK."
            find app/build/outputs/apk -type f -name '*.apk' -print
            exit 1
          fi

          if find app/build/outputs/apk/release -name '*-unsigned.apk' -print -quit | grep -q .; then
            echo "::error::Unsigned release APK was produced. Refusing to upload it."
            exit 1
          fi

          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*-release.apk' -print -quit)"
          if [[ -z "$apk_path" ]]; then
            echo "::error::No signed release APK found."
            find app/build/outputs/apk -type f -name '*.apk' -print
            exit 1
          fi

          version_name="$(python3 -c 'import json; print(json.load(open("app/build/outputs/apk/release/output-metadata.json"))["elements"][0]["versionName"])')"
          artifact_path="artifacts/mumla-${version_name}-release.apk"
          cp "$apk_path" "$artifact_path"

          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$artifact_path"

          python3 - "$artifact_path" <<'PY'
          import sys
          import zipfile

          apk_path = sys.argv[1]
          abis = ("armeabi-v7a", "arm64-v8a", "x86", "x86_64")
          libs = ("libjnicelt7.so", "libjnicelt11.so", "libjniopus.so", "libjnispeex.so")

          with zipfile.ZipFile(apk_path) as apk:
              entries = set(apk.namelist())

          missing = [f"lib/{abi}/{lib}" for abi in abis for lib in libs if f"lib/{abi}/{lib}" not in entries]
          if missing:
              print("::error::APK is missing required native codec libraries:")
              print("\n".join(missing))
              sys.exit(1)
          PY

          sha256sum "$artifact_path" > artifacts/SHA256SUMS.txt
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "APK_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          ls -lh artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mumla-${{ steps.apk.outputs.version_name }}-release-apk
          path: artifacts/
          if-no-files-found: error

      - name: Remove old ABI release assets
        if: ${{ github.event_name == 'release' || startsWith(inputs.release_tag, 'v') || startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          gh release delete-asset "$RELEASE_TAG" "mumla-${tag_version}-arm64-v8a-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${tag_version}-armeabi-v7a-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${APK_VERSION_NAME}-arm64-v8a-release.apk" --yes || true
          gh release delete-asset "$RELEASE_TAG" "mumla-${APK_VERSION_NAME}-armeabi-v7a-release.apk" --yes || true

      - name: Upload GitHub Release assets
        if: ${{ github.event_name == 'release' || startsWith(inputs.release_tag, 'v') || startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Mumla ${{ steps.apk.outputs.version_name }}
          files: artifacts/*
